spring.application.name=pollSystem
spring.profiles.active=local

spring.ai.mcp.server.protocol=STATELESS
spring.ai.mcp.server.name=poll-system-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.stateless.mcp-endpoint=/mcp

spring.ai.mcp.server.capabilities.resources.subscribe=false
spring.ai.mcp.server.capabilities.completion=false

spring.datasource.url=jdbc:postgresql://localhost:5432/pollSystem
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

security.jwt.expiration-minutes=60